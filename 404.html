<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — SIGNAL LOST</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --text: #e6edf3;
            --muted: #8b949e;
            --high: #ef4444;
            --teal: #1D9E75;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 40px;
        }

        .radar-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 1px solid var(--high);
            border-radius: 50%;
            opacity: 0.2;
            animation: pulse 3s infinite ease-out;
            pointer-events: none;
        }

        .radar-ring:nth-child(2) {
            animation-delay: -2s;
        }

        .radar-ring:nth-child(3) {
            animation-delay: -1s;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0.3;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }

        h1 {
            font-size: 80px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -2px;
            color: var(--high);
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--text);
            margin-bottom: 20px;
        }

        p {
            color: var(--muted);
            font-size: 14px;
            max-width: 360px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--teal);
            color: var(--teal);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            border-radius: 6px;
            transition: all 0.2s;
        }

        a:hover {
            background: var(--teal);
            color: var(--bg);
        }

        .status {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            font-size: 10px;
            color: rgba(239, 68, 68, 0.4);
            letter-spacing: 0.3em;
        }
    </style>
</head>

<body>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>

    <div class="container">
        <h1>404</h1>
        <div class="title">SIGNAL LOST · ZONE UNCHARTED</div>
        <p>You have exceeded the monitored basin boundary. Sensory data stream terminated. Re-establishing link...</p>
        <a href="/">RETURN TO MONITORING STATION</a>
    </div>

    <div class="status">OUTSIDE OPERATIONAL PARAMETERS</div>
</body>

</html>
